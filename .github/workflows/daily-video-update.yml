name: Daily Cloudflare video update

on:
  push:
    branches:
      - main
  schedule:
    - cron: "10 1 * * *"
    - cron: "10 7 * * *"
    - cron: "10 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-video-update-main
  cancel-in-progress: false

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Fetch and build conservative video updates
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          AUTO_APPROVE_LIMIT: "5"
          YOUTUBE_MAX_RESULTS: "50"
          YOUTUBE_TARGET_CANDIDATES: "200"
          YOUTUBE_REGION: "US"
        run: |
          node src/fetch-youtube-candidates.mjs
          node src/auto-update-videos.mjs
          node src/import-reviewed-videos.mjs
          node src/build.mjs

      - name: Commit updated site data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add work/youtube-candidates.json work/reviewed-videos.json work/auto-update-report.json src/imported-videos.js outputs/video-pulse
          if git diff --cached --quiet; then
            echo "No video updates to commit."
          else
            git commit -m "Update curated video pages"
            git pull --rebase origin main
            git push
          fi

      - name: Deploy to Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --name 123 --assets outputs/video-pulse --compatibility-date 2026-07-11
